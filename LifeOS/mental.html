<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<link rel="stylesheet" href="theme.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A1410">
<title>Mental · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #0A1410;
  --text-primary: #EAEFEA;
  --text-secondary: #9fb3a9;
  --text-tertiary: #6E827A;
  --accent: #6BE3A4;
  --warn: #F2C063;
  --line: rgba(124,239,185,0.16);
  --font: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: 'Space Mono', ui-monospace, monospace;
  --font-head: 'Space Grotesk', var(--font);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; }
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 18px 90px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(124,239,185,0.14), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(124,239,185,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(124,239,185,0.02) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 720px; margin: 0 auto; }
.page-head { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
.back-btn {
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-primary); border-radius: 10px; padding: 8px 13px;
  font-size: 16px; opacity: 0.6; transition: opacity 0.15s; text-decoration: none;
  display: inline-flex; align-items: center;
}
.back-btn:hover { opacity: 1; }
.page-title {
  margin: 0; font-family: var(--font-head); font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
  background: linear-gradient(180deg,#FFFFFF 0%,#C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.section-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-tertiary); margin: 0 0 10px;
}
.glass {
  background: linear-gradient(165deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 45%, rgba(0,0,0,0.06) 100%);
  border: 1px solid rgba(255,255,255,0.12); border-top-color: rgba(255,255,255,0.30);
  backdrop-filter: blur(22px) saturate(1.35);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 16px 44px rgba(0,0,0,0.45);
  border-radius: 20px; padding: 20px; margin-bottom: 18px;
}

/* ---- Mood ---- */
.mood-row { display: flex; justify-content: space-between; gap: 8px; }
.mood-btn {
  flex: 1; border: 2px solid rgba(255,255,255,0.08); border-radius: 14px;
  background: rgba(0,0,0,0.20); font-size: 26px; padding: 10px 0;
  cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.mood-btn:hover { background: rgba(255,255,255,0.05); }
.mood-btn:active { transform: scale(0.94); }
.mood-btn.selected { border-color: var(--accent); background: rgba(107,227,164,0.12); box-shadow: 0 0 0 3px rgba(107,227,164,0.18); }

/* ---- Intention ---- */
.mi-input {
  width: 100%; padding: 13px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.25); color: var(--text-primary); font-family: var(--font); font-size: 15px;
  outline: none; transition: border-color 0.2s;
}
.mi-input:focus { border-color: rgba(107,227,164,0.45); }
.mi-input::placeholder { color: var(--text-tertiary); }

/* ---- Energy + sleep ---- */
.energy-row { display: flex; gap: 14px; align-items: flex-end; margin-bottom: 14px; }
.energy-field { flex: 1; }
.energy-label { font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px; }
.sleep-input {
  width: 100%; padding: 11px 13px; border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.25); color: var(--text-primary); font-family: var(--font-mono); font-size: 15px;
  outline: none; transition: border-color 0.2s;
}
.sleep-input:focus { border-color: rgba(107,227,164,0.45); }
.star-row { display: flex; gap: 6px; }
.star-btn {
  flex: 1; border: 0; background: transparent; font-size: 26px; padding: 4px 0;
  cursor: pointer; opacity: 0.3; transition: opacity 0.15s, transform 0.1s; filter: grayscale(1);
}
.star-btn.active { opacity: 1; filter: grayscale(0); }
.star-btn:active { transform: scale(0.9); }

/* ---- Win ---- */
.win-yesterday {
  font-size: 13px; color: var(--text-tertiary); font-style: italic; opacity: 0.6;
  margin-bottom: 8px; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 10px;
}

/* ---- Brain dump ---- */
.dump-textarea {
  width: 100%; min-height: 90px; padding: 13px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.25); color: var(--text-primary); font-family: var(--font); font-size: 14.5px;
  outline: none; resize: none; overflow: hidden; line-height: 1.5; transition: border-color 0.2s;
}
.dump-textarea:focus { border-color: rgba(107,227,164,0.45); }
.dump-textarea::placeholder { color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="page">
  <div class="page-head">
    <a class="back-btn" href="index.html">←</a>
    <h1 class="page-title">Mental</h1>
  </div>

  <!-- MOOD CHECK-IN -->
  <div class="section-label">MOOD CHECK-IN</div>
  <div class="glass">
    <div class="mood-row" id="moodRow">
      <button class="mood-btn" data-mood="1">😴</button>
      <button class="mood-btn" data-mood="2">😕</button>
      <button class="mood-btn" data-mood="3">😐</button>
      <button class="mood-btn" data-mood="4">🙂</button>
      <button class="mood-btn" data-mood="5">🔥</button>
    </div>
  </div>

  <!-- DAILY INTENTION -->
  <div class="section-label">DAILY INTENTION</div>
  <div class="glass">
    <input class="mi-input" id="intentionInput" type="text" placeholder="Today's north star…" autocomplete="off">
  </div>

  <!-- ENERGY + SLEEP -->
  <div class="section-label">ENERGY + SLEEP</div>
  <div class="glass">
    <div class="energy-row">
      <div class="energy-field">
        <div class="energy-label">SLEEP (HOURS)</div>
        <input class="sleep-input" id="sleepInput" type="number" step="0.5" min="0" max="24" placeholder="7.5" inputmode="decimal">
      </div>
    </div>
    <div class="energy-label">ENERGY</div>
    <div class="star-row" id="starRow">
      <button class="star-btn" data-star="1">★</button>
      <button class="star-btn" data-star="2">★</button>
      <button class="star-btn" data-star="3">★</button>
      <button class="star-btn" data-star="4">★</button>
      <button class="star-btn" data-star="5">★</button>
    </div>
  </div>

  <!-- WIN OF THE DAY -->
  <div class="section-label">WIN OF THE DAY</div>
  <div class="glass">
    <div class="win-yesterday" id="winYesterday" style="display:none"></div>
    <input class="mi-input" id="winInput" type="text" placeholder="What went well today?" autocomplete="off">
  </div>

  <!-- QUICK BRAIN DUMP -->
  <div class="section-label">QUICK BRAIN DUMP</div>
  <div class="glass">
    <textarea class="dump-textarea" id="dumpInput" placeholder="Get it out of your head…"></textarea>
  </div>
</div>

<script>
(function () {
  'use strict';
  const KEY = 'mental_v1';

  function activeDateKey(offsetDays) {
    const now = new Date();
    const d = new Date(now);
    if (now.getHours() < 6) d.setDate(d.getDate() - 1);
    if (offsetDays) d.setDate(d.getDate() + offsetDays);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function load() {
    try {
      const s = JSON.parse(localStorage.getItem(KEY));
      if (s && typeof s === 'object') return s;
    } catch (e) {}
    return { moods: {}, intentions: {}, energy: {}, wins: {}, dump: {} };
  }
  function save(state) {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
  }

  const today = activeDateKey(0);
  const yesterday = activeDateKey(-1);
  const state = load();

  /* ===== MOOD ===== */
  function renderMood() {
    const selected = state.moods[today];
    document.querySelectorAll('.mood-btn').forEach(btn => {
      btn.classList.toggle('selected', Number(btn.dataset.mood) === selected);
    });
  }
  document.getElementById('moodRow').addEventListener('click', e => {
    const btn = e.target.closest('.mood-btn');
    if (!btn) return;
    state.moods[today] = Number(btn.dataset.mood);
    save(state);
    renderMood();
  });

  /* ===== INTENTION ===== */
  const intentionInput = document.getElementById('intentionInput');
  intentionInput.value = state.intentions[today] || '';
  intentionInput.addEventListener('input', () => {
    state.intentions[today] = intentionInput.value;
    save(state);
  });

  /* ===== ENERGY + SLEEP ===== */
  const sleepInput = document.getElementById('sleepInput');
  const dayEnergy = state.energy[today] || {};
  sleepInput.value = dayEnergy.sleep != null ? dayEnergy.sleep : '';
  sleepInput.addEventListener('input', () => {
    const v = parseFloat(sleepInput.value);
    state.energy[today] = state.energy[today] || {};
    state.energy[today].sleep = isNaN(v) ? null : v;
    save(state);
  });

  function renderStars() {
    const val = (state.energy[today] || {}).energy || 0;
    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.classList.toggle('active', Number(btn.dataset.star) <= val);
    });
  }
  document.getElementById('starRow').addEventListener('click', e => {
    const btn = e.target.closest('.star-btn');
    if (!btn) return;
    state.energy[today] = state.energy[today] || {};
    state.energy[today].energy = Number(btn.dataset.star);
    save(state);
    renderStars();
  });

  /* ===== WIN OF THE DAY ===== */
  const winYesterdayEl = document.getElementById('winYesterday');
  if (state.wins[yesterday]) {
    winYesterdayEl.textContent = 'Yesterday: ' + state.wins[yesterday];
    winYesterdayEl.style.display = 'block';
  }
  const winInput = document.getElementById('winInput');
  winInput.value = state.wins[today] || '';
  winInput.addEventListener('input', () => {
    state.wins[today] = winInput.value;
    save(state);
  });

  /* ===== BRAIN DUMP ===== */
  const dumpInput = document.getElementById('dumpInput');
  dumpInput.value = state.dump[today] || '';
  function autoGrow() {
    dumpInput.style.height = 'auto';
    dumpInput.style.height = dumpInput.scrollHeight + 'px';
  }
  dumpInput.addEventListener('input', () => {
    state.dump[today] = dumpInput.value;
    save(state);
    autoGrow();
  });

  /* ===== INIT ===== */
  renderMood();
  renderStars();
  autoGrow();
})();
</script>
</body>
</html>
