<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova Lite · AI Mentor</title>
<link rel="stylesheet" href="theme.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<!-- ============================================================
 * NOVA LITE — a simple, drop-in AI mentor for ANY dashboard.
 * Single self-contained file. No backend, no build step.
 *
 * HOW IT WORKS (bring-your-own-key):
 *   • The viewer pastes their OWN NVIDIA API key (stored only in
 *     their browser's localStorage — never sent anywhere but NVIDIA).
 *   • Nova reads whatever the dashboard saved in localStorage for context.
 *   • Calls NVIDIA's OpenAI-compatible NIM API (moonshotai/kimi-k2.6)
 *     directly from the browser.
 *
 * This is the lightweight version: the shared crystal avatar, basic chat.
 * The premium build (3D avatar, Spark voice scheduler, secure server
 * proxy, palettes) is the paid Patreon episode.
 * ============================================================ -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --accent: #7CEFB9; --accent-2: #67E8F9; --bg: #0A1410; --fg: #EAEFEA; --muted: rgba(159,179,169,.75); --line: rgba(124,239,185,.16); }
html, body { background: var(--bg); }
body { font-family: 'Hanken Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); min-height: 100vh; }

.wrap { max-width: 560px; margin: 0 auto; padding: 28px 18px 60px; }
.top { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.back-btn { border: 1px solid var(--line); background: rgba(255,255,255,.03); color: var(--fg); border-radius: 10px; padding: 7px 11px; cursor: pointer; font-size: 15px; line-height: 1; opacity: .55; transition: opacity .15s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.back-btn:hover { opacity: 1; }
.key-toggle { margin-left: auto; border: 1px solid var(--line); background: rgba(255,255,255,.03); border-radius: 10px; padding: 7px 10px; cursor: pointer; font-size: 15px; line-height: 1; opacity: .55; transition: opacity .15s; }
.key-toggle:hover { opacity: 1; }
.key-toggle.has-key { opacity: 1; border-color: var(--accent); }
.keypanel { display: none; }
.keypanel.open { display: block; }

/* ---- crystal avatar host (mounted by nova-avatar.js) ---- */
.orb-wrap { display: flex; justify-content: center; margin-bottom: 22px; }
.orb { width: 100%; max-width: 280px; aspect-ratio: 1/1; border-radius: 20px; position: relative;
  background: radial-gradient(circle at 50% 48%, #16291F 0%, rgba(18,35,28,0.45) 42%, rgba(10,20,16,0) 72%);
  overflow: hidden; }

.title h1 { font-family: 'Newsreader', Georgia, serif; font-style: italic; font-size: 26px; font-weight: 500;
  background: linear-gradient(90deg, var(--accent-2), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.title .role { font-family: 'Space Mono', ui-monospace, monospace; font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

/* ---- key setup ---- */
.keybar { display: flex; gap: 8px; margin-bottom: 16px; }
.keybar input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 10px; padding: 11px 13px; font-size: 13px; outline: none; }
.keybar input:focus { border-color: var(--accent); }
.keybar button { border: 0; border-radius: 10px; padding: 0 16px; cursor: pointer; color: #04140d; background: var(--accent); font-weight: 600; font-size: 13px; }
.hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
.hint a { color: var(--accent-2); }
.hint.saved { color: var(--accent); }

/* ---- chat ---- */
.feed { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.msg { max-width: 90%; }
.msg.user { align-self: flex-end; }
.msg.coach { align-self: flex-start; width: 100%; }
.bubble { border-radius: 14px; padding: 13px 15px; font-size: 14.5px; line-height: 1.55; }
.msg.user .bubble { background: rgba(255,255,255,.05); border: 1px solid var(--line); }
.msg.coach .bubble { background: rgba(255,255,255,.04); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-left: 3px solid var(--accent); }
.tag { display: inline-block; margin-bottom: 9px; font-family: ui-monospace, monospace; font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #04140d; background: var(--accent); padding: 3px 9px; border-radius: 999px; }
.bubble b, .pill { color: var(--accent); font-weight: 700; }
.pill { background: color-mix(in srgb, var(--accent) 18%, transparent); padding: 1px 7px; border-radius: 6px; font-weight: 600; }
.nova-action-log { margin-top: 8px; padding: 6px 10px; background: rgba(107,227,164,0.10); border: 1px solid rgba(107,227,164,0.20); border-radius: 8px; font-size: 11px; color: var(--accent); font-family: var(--font-mono); }
.reply-list { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 6px; }
.reply-list li { line-height: 1.45; }
.dots { display: inline-flex; gap: 5px; } .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .4; animation: d 1.2s ease-in-out infinite; }
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.composer { display: flex; gap: 9px; }
.composer input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 12px; padding: 13px 15px; font-size: 14.5px; outline: none; }
.composer input:focus { border-color: var(--accent); }
.composer button { width: 50px; border: 0; border-radius: 12px; cursor: pointer; color: #04140d; background: var(--accent); font-size: 18px; }
.composer button:active { transform: scale(.94); }

/* ---- brain panel ---- */
.brain-btn { margin-left: 6px; border: 1px solid var(--line); background: rgba(255,255,255,.03); border-radius: 10px; padding: 7px 10px; cursor: pointer; font-size: 15px; line-height: 1; opacity: .55; transition: opacity .15s; }
.brain-btn:hover { opacity: 1; }
.brain-btn.has-mem { opacity: 1; border-color: var(--accent); }
.brain-overlay { position: fixed; inset: 0; z-index: 400; display: none; }
.brain-overlay.open { display: block; }
.brain-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(10px); }
.brain-panel {
  position: absolute; top: 0; right: 0; bottom: 0; width: min(380px,100vw);
  background: linear-gradient(165deg, rgba(14,30,22,.97), rgba(6,14,11,.99));
  border-left: 1px solid rgba(255,255,255,.12);
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: -20px 0 60px rgba(0,0,0,.5);
}
.brain-head { padding: 20px 18px 14px; border-bottom: 1px solid rgba(255,255,255,.07); position: relative; }
.brain-title { font-size: 16px; font-weight: 700; color: var(--fg); margin-bottom: 3px; }
.brain-sub { font-size: 11.5px; color: var(--muted); }
.brain-x { position: absolute; top: 16px; right: 14px; border: 0; background: transparent; color: var(--muted); font-size: 24px; cursor: pointer; line-height: 1; }
.brain-x:hover { color: var(--fg); }
.brain-add-area { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,.06); display: flex; flex-direction: column; gap: 8px; }
.bc-row { display: flex; gap: 6px; flex-wrap: wrap; }
.bc { border: 1px solid rgba(255,255,255,.10); background: transparent; color: var(--muted); border-radius: 8px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; transition: background .12s, color .12s, border-color .12s; }
.bc.on { background: rgba(124,239,185,.14); color: var(--accent); border-color: rgba(124,239,185,.30); }
.bi-row { display: flex; gap: 8px; align-items: flex-end; }
.bi { flex: 1; background: rgba(0,0,0,.25); border: 1px solid rgba(255,255,255,.09); border-radius: 10px; color: var(--fg); font-size: 13.5px; padding: 9px 12px; outline: none; resize: none; min-height: 58px; font-family: inherit; transition: border-color .2s; }
.bi:focus { border-color: rgba(124,239,185,.40); }
.bi-save { border: 0; border-radius: 10px; padding: 0 14px; background: var(--accent); color: #04140d; font-size: 13px; font-weight: 700; cursor: pointer; height: 38px; flex-shrink: 0; }
.brain-entries { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
.be { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); border-radius: 12px; padding: 11px 13px; display: flex; align-items: flex-start; gap: 10px; }
.be-body { flex: 1; min-width: 0; }
.be-cat { font-size: 9px; font-weight: 700; letter-spacing: .10em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.be-text { font-size: 13px; color: var(--fg); line-height: 1.5; }
.be-del { border: 0; background: transparent; color: var(--muted); font-size: 15px; cursor: pointer; opacity: .45; transition: opacity .15s, color .15s; }
.be-del:hover { opacity: 1; color: #FF6B6B; }
.brain-empty { text-align: center; padding: 32px 0; font-size: 12.5px; color: var(--muted); font-style: italic; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back-btn" href="index.html" aria-label="Back to dashboard" title="Back to dashboard">←</a>
      <div class="title"><h1>Nova Lite</h1><div class="role">your mentor</div></div>
      <button id="brainToggle" class="brain-btn" title="Nova's Brain">&#129504;</button>
      <button id="keyToggle" class="key-toggle" aria-label="API key settings" title="API key"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 2l-9.6 9.6"/><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><circle cx="7.5" cy="15.5" r="5.5"/></svg></button>
    </div>
    <div class="orb-wrap"><div class="orb" id="orb"></div></div>

    <div class="keypanel" id="keypanel">
      <div class="keybar">
        <input id="keyInput" type="password" placeholder="paste your NVIDIA API key (nvapi-…)" autocomplete="off" />
        <button id="keySave">Save</button>
      </div>
      <div class="hint" id="hint">
        Your key is stored only in <b>this browser</b> and sent straight to NVIDIA — never to us.
        Get one at <a href="https://build.nvidia.com/moonshotai/kimi-k2.6" target="_blank" rel="noopener">build.nvidia.com</a>.
      </div>
    </div>

    <div class="feed" id="feed"></div>

    <div class="composer">
      <input id="chatInput" placeholder="ask Nova anything…" autocomplete="off" />
      <button id="send" aria-label="Send">→</button>
    </div>
  </div>

<!-- Brain panel -->
<div class="brain-overlay" id="brainOverlay">
  <div class="brain-backdrop" id="brainBackdrop"></div>
  <div class="brain-panel">
    <div class="brain-head">
      <div class="brain-title">Nova's Brain</div>
      <div class="brain-sub">Memories Nova carries into every conversation</div>
      <button class="brain-x" id="brainClose">&times;</button>
    </div>
    <div class="brain-add-area">
      <div class="bc-row" id="bcRow">
        <button class="bc on" data-c="Goals">Goals</button>
        <button class="bc" data-c="About Me">About Me</button>
        <button class="bc" data-c="Context">Context</button>
        <button class="bc" data-c="Wins">Wins</button>
      </div>
      <div class="bi-row">
        <textarea class="bi" id="brainInput" placeholder="Add a memory for Nova..." rows="2"></textarea>
        <button class="bi-save" id="brainSave">Add</button>
      </div>
    </div>
    <div class="brain-entries" id="brainEntries"></div>
  </div>
</div>

<script>
(function(){
  const KEY_LS = 'nova_lite_api_key';
  const BRAIN_LS = 'nova_brain_v1';
  const feed = document.getElementById('feed');
  const input = document.getElementById('chatInput');
  const orb = document.getElementById('orb');
  const keyInput = document.getElementById('keyInput');
  const hint = document.getElementById('hint');
  const keypanel = document.getElementById('keypanel');
  const keyToggle = document.getElementById('keyToggle');
  keyToggle.addEventListener('click', () => keypanel.classList.toggle('open'));

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  const ORB_STATE_MAP = { '': 'idle', think: 'thinking', happy: 'positive' };
  function setOrb(s){ if (window.novaAvatar) window.novaAvatar.go(ORB_STATE_MAP[s || ''] || 'idle'); }

  // ---- key handling ----
  function savedKey(){ try { return localStorage.getItem(KEY_LS) || ''; } catch(e){ return ''; } }
  if (savedKey()) { hint.classList.add('saved'); hint.innerHTML = '✓ Key saved in this browser. Ask away.'; keyInput.placeholder = '•••• key saved ••••'; keyToggle.classList.add('has-key'); }
  document.getElementById('keySave').addEventListener('click', () => {
    const k = keyInput.value.trim();
    if (!k) return;
    try { localStorage.setItem(KEY_LS, k); } catch(e){}
    keyInput.value = ''; keyInput.placeholder = '•••• key saved ••••';
    hint.classList.add('saved'); hint.innerHTML = '✓ Key saved in this browser. Ask away.';
    keyToggle.classList.add('has-key');
    keypanel.classList.remove('open'); // tuck it away so it's not on screen
  });

  // ---- Nova dashboard actions ----
  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function executeNovaActions(reply) {
    const results = [];
    const tokens = reply.match(/\{\{[^}]+\}\}/g) || [];
    for (const token of tokens) {
      const inner = token.slice(2, -2).trim();
      try {
        if (inner === 'addWater') {
          const s = JSON.parse(localStorage.getItem('po_water_v1') || '{}');
          s.logs = s.logs || {};
          const k = todayKey();
          s.logs[k] = (s.logs[k] || 0) + 1;
          localStorage.setItem('po_water_v1', JSON.stringify(s));
          results.push('Water gelogd (' + s.logs[k] + 'x vandaag)');
        } else if (inner.startsWith('weight:')) {
          const kg = parseFloat(inner.slice(7));
          if (kg > 20 && kg < 350) {
            const arr = JSON.parse(localStorage.getItem('po_coach_weights') || '[]');
            const k = todayKey();
            const idx = arr.findIndex(e => e.dateKey === k);
            if (idx !== -1) arr[idx].weight = kg;
            else arr.push({ dateKey: k, weight: kg });
            arr.sort((a, b) => a.dateKey.localeCompare(b.dateKey));
            localStorage.setItem('po_coach_weights', JSON.stringify(arr));
            results.push('Gewicht gelogd: ' + kg + ' kg');
          }
        } else if (inner.startsWith('logEntry:')) {
          const parts = inner.slice(9).split('|');
          const title = (parts[0] || '').trim();
          const text  = (parts[1] || title).trim();
          const entries = JSON.parse(localStorage.getItem('logboek_v1') || '[]');
          entries.push({ id: Date.now().toString(36), dateKey: todayKey(), title, text, mood: 'ok', ts: Date.now() });
          localStorage.setItem('logboek_v1', JSON.stringify(entries));
          results.push('Logboek entry opgeslagen');
        }
      } catch(e) {}
    }
    return results;
  }

  // ---- read whatever the dashboard stored (for context) ----
  function dashboardData(){
    const out = {};
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (k === KEY_LS) continue; // never send the key as data
      try { out[k] = JSON.parse(localStorage.getItem(k)); } catch(e){ out[k] = localStorage.getItem(k); }
    }
    return out;
  }

  // ---- render: bullets + **pills** ----
  function inlineMarks(s){ return esc(s).replace(/\*\*(.+?)\*\*/g, '<span class="pill">$1</span>'); }
  function render(text){
    const lines = String(text).split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const items = [], loose = [];
    for (const l of lines){
      if (/^[-•*]\s+/.test(l)) items.push('<li>' + inlineMarks(l.replace(/^[-•*]\s+/, '')) + '</li>');
      else loose.push(inlineMarks(l));
    }
    let html = loose.join('<br>');
    if (items.length) html += (html ? '<br>' : '') + '<ul class="reply-list">' + items.join('') + '</ul>';
    return html;
  }
  function addUser(t){ const e = document.createElement('div'); e.className = 'msg user'; e.innerHTML = '<div class="bubble">' + esc(t) + '</div>'; feed.appendChild(e); scroll(); }
  function addCoach(html){ const e = document.createElement('div'); e.className = 'msg coach'; e.innerHTML = '<div class="bubble"><span class="tag">Nova</span><div>' + html + '</div></div>'; feed.appendChild(e); scroll(); return e; }
  function scroll(){ window.scrollTo(0, document.body.scrollHeight); }

  function brainContext() {
    try {
      const mem = JSON.parse(localStorage.getItem(BRAIN_LS)) || [];
      if (!mem.length) return '';
      return '\n\nNova\'s long-term memory about this user:\n' +
        mem.map(m => `[${m.category}] ${m.text}`).join('\n') + '\n';
    } catch (e) { return ''; }
  }

  const SYS =
    "You are Nova, a personal mentor living inside the user's life-tracking dashboard. " +
    "You have a long-term memory about the user (listed below). " +
    "You can also see all their current dashboard data. " +
    "Give honest, specific, encouraging guidance. " +
    "Answer in short bullet points starting with '- ', few words each, plain language. " +
    "Wrap key words and numbers in **double asterisks**. " +
    "End with one '- Do today:' bullet giving the single action. " +
    "\n\nACTIONS: You can modify the dashboard by embedding action tokens in your response. " +
    "Embed them ONLY when the user explicitly asks you to update data, or you recommend tracking something right now. " +
    "Available tokens (embed exactly as shown, they execute silently and are hidden from display):\n" +
    "  {{addWater}} — logs +1 drink of water today\n" +
    "  {{weight:XX.X}} — logs body weight in kg, replace XX.X with the number\n" +
    "  {{logEntry:Title|Body text}} — saves a note to the user's logboek (| separates title from text)\n" +
    "When you use an action, mention it briefly in your text response too (e.g. '- Logged 75.2 kg for you.').\n\n" +
    "Dashboard data as JSON:\n";

  let busy = false;
  async function ask(text){
    text = (text||'').trim(); if (!text || busy) return;
    const key = savedKey();
    busy = true; addUser(text); input.value = '';
    setOrb('think');
    const loading = addCoach('<span class="dots"><i></i><i></i><i></i></span>');
    try {
      const res = await fetch('/api/nova-proxy', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          key,
          messages: [
            { role: 'system', content: SYS + brainContext() + JSON.stringify(dashboardData()) },
            { role: 'user', content: text },
          ],
        }),
      });
      const json = await res.json();
      if (json.error){ loading.querySelector('div:last-child').innerHTML = render('- ' + (json.error.message || 'Something went wrong — check your API key.')); setOrb(''); busy = false; return; }
      let reply = json.text || 'Hmm, no reply.';
      const actionResults = executeNovaActions(reply);
      reply = reply.replace(/\{\{[^}]+\}\}/g, '').trim();
      loading.querySelector('div:last-child').innerHTML = render(reply) + (actionResults.length ? '<div class="nova-action-log">' + actionResults.map(r => '&#10003; ' + r).join(' &middot; ') + '</div>' : '');
      setOrb('happy'); setTimeout(() => setOrb(''), 2500);
    } catch(e){
      loading.querySelector('div:last-child').innerHTML = render('- Could not reach NVIDIA — check your connection and key.');
      setOrb('');
    }
    busy = false;
  }

  document.getElementById('send').addEventListener('click', () => ask(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(input.value); });

  addCoach('Hey — I\'m <b>Nova</b>, the intelligence behind your <b>personal operating system</b>. I connect your <b>goals</b>, <b>health</b>, <b>finances</b>, <b>projects</b>, <b>routines</b>, and <b>ideas</b> into one continuous conversation. I <b>remember what matters</b>, help you make <b>better decisions</b>, and keep you focused on <b>what moves you forward</b>. Whether you need <b>advice</b>, <b>planning</b>, <b>analysis</b>, or simply a <b>second brain</b>, I\'m here whenever you need me.');

  // ---- brain panel ----
  const BRAIN_CATS = ['Goals', 'About Me', 'Context', 'Wins'];
  const brainBtn = document.getElementById('brainToggle');
  const brainOverlay = document.getElementById('brainOverlay');
  const brainClose = document.getElementById('brainClose');
  const brainBackdrop = document.getElementById('brainBackdrop');
  let selCat = 'Goals';

  function loadBrain() {
    try { return JSON.parse(localStorage.getItem(BRAIN_LS)) || []; }
    catch (e) { return []; }
  }
  function saveBrain(mem) { localStorage.setItem(BRAIN_LS, JSON.stringify(mem)); }

  function escB(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function renderBrain() {
    const mem = loadBrain();
    brainBtn.classList.toggle('has-mem', mem.length > 0);
    const el = document.getElementById('brainEntries');
    if (!mem.length) { el.innerHTML = '<div class="brain-empty">No memories yet. Add things Nova should always know about you.</div>'; return; }
    el.innerHTML = mem.map(m =>
      `<div class="be">
        <div class="be-body"><div class="be-cat">${escB(m.category)}</div><div class="be-text">${escB(m.text)}</div></div>
        <button class="be-del" data-id="${m.id}">&times;</button>
      </div>`
    ).join('');
    el.querySelectorAll('.be-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const mem2 = loadBrain().filter(m => m.id !== btn.dataset.id);
        saveBrain(mem2); renderBrain();
      });
    });
  }

  document.getElementById('bcRow').addEventListener('click', e => {
    const btn = e.target.closest('.bc');
    if (!btn) return;
    selCat = btn.dataset.c;
    document.querySelectorAll('.bc').forEach(b => b.classList.toggle('on', b.dataset.c === selCat));
  });

  document.getElementById('brainSave').addEventListener('click', () => {
    const text = document.getElementById('brainInput').value.trim();
    if (!text) return;
    const mem = loadBrain();
    mem.unshift({ id: Date.now().toString(36), category: selCat, text, ts: new Date().toISOString() });
    saveBrain(mem); renderBrain();
    document.getElementById('brainInput').value = '';
  });
  document.getElementById('brainInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('brainSave').click(); }
  });

  brainBtn.addEventListener('click', () => { brainOverlay.classList.add('open'); renderBrain(); });
  brainClose.addEventListener('click', () => brainOverlay.classList.remove('open'));
  brainBackdrop.addEventListener('click', () => brainOverlay.classList.remove('open'));

  renderBrain();
})();
</script>

const orbHost = document.getElementById('orb');
if (orbHost) window.novaAvatar = new NovaAvatar(orbHost);
</script>
