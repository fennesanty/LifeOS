<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<link rel="stylesheet" href="theme.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A1410">
<title>Pomodoro · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #0A1410;
  --text-primary: #EAEFEA;
  --text-secondary: #9fb3a9;
  --text-tertiary: #6E827A;
  --accent: #6BE3A4;
  --line: rgba(124,239,185,0.16);
  --font: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: 'Space Mono', ui-monospace, monospace;
  --font-head: 'Space Grotesk', var(--font);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; }
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 18px 80px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(124,239,185,0.14), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(124,239,185,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(124,239,185,0.02) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 660px; margin: 0 auto; }
.page-head { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
.back-btn {
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-primary); border-radius: 10px; padding: 8px 13px;
  font-size: 16px; opacity: 0.6; transition: opacity 0.15s;
  text-decoration: none; display: inline-flex; align-items: center;
}
.back-btn:hover { opacity: 1; }
.page-title {
  margin: 0; font-family: var(--font-head); font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
  background: linear-gradient(180deg,#FFFFFF 0%,#C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}

.glass {
  background: linear-gradient(165deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 45%, rgba(0,0,0,0.06) 100%);
  border: 1px solid rgba(255,255,255,0.12); border-top-color: rgba(255,255,255,0.30);
  backdrop-filter: blur(22px) saturate(1.35);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 16px 44px rgba(0,0,0,0.45);
  border-radius: 22px; padding: 24px; margin-bottom: 16px;
}

.modes { display: flex; border: 1px solid rgba(255,255,255,0.10); border-radius: 13px; overflow: hidden; margin-bottom: 22px; }
.mode-btn {
  flex: 1; border: 0; background: transparent; color: var(--text-tertiary);
  font-family: var(--font); font-size: 12.5px; font-weight: 700; padding: 10px 6px;
  cursor: pointer; transition: background 0.15s, color 0.15s;
}
.mode-btn.active { background: rgba(107,227,164,0.14); color: var(--accent); }

.subject-row { display: flex; gap: 8px; margin-bottom: 22px; }
.subject-sel {
  flex: 1; padding: 11px 13px; border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.25); color: var(--text-primary); font-family: var(--font); font-size: 14px;
  outline: none; -webkit-appearance: none; transition: border-color 0.2s;
}
.subject-sel:focus { border-color: rgba(107,227,164,0.45); }
.subject-sel option { background: #0e1f18; }
.icon-btn {
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-secondary); border-radius: 11px; padding: 11px 14px;
  font-size: 18px; cursor: pointer; line-height: 1; transition: background 0.15s, color 0.15s;
}
.icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

.timer-wrap { display: flex; justify-content: center; margin-bottom: 22px; }
.timer-ring { position: relative; width: 220px; height: 220px; }
.timer-ring svg { display: block; }
.t-track { fill: none; stroke: rgba(255,255,255,0.06); }
.t-prog { fill: none; stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.timer-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.t-time { font-family: var(--font-mono); font-size: 48px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; line-height: 1; }
.t-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-tertiary); margin-top: 6px; }

.controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
.btn {
  border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
  color: var(--text-primary); border-radius: 14px; padding: 13px 28px;
  font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn:hover { background: rgba(255,255,255,0.10); }
.btn:active { transform: scale(0.96); }
.btn.primary { background: rgba(107,227,164,0.14); color: var(--accent); border-color: rgba(107,227,164,0.28); }
.btn.primary:hover { background: rgba(107,227,164,0.22); }

.streak-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
.streak-days { display: flex; gap: 6px; }
.s-day {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
  border: 1px solid rgba(255,255,255,0.08); color: var(--text-tertiary);
}
.s-day.done { background: rgba(107,227,164,0.16); color: var(--accent); border-color: rgba(107,227,164,0.30); }
.s-day.today { border-color: rgba(107,227,164,0.55); }
.streak-txt { font-size: 12px; color: var(--text-tertiary); }

.tab-nav { display: flex; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
.tab-btn { flex: 1; border: 0; background: transparent; color: var(--text-tertiary); font-family: var(--font); font-size: 12px; font-weight: 700; padding: 10px 6px; cursor: pointer; transition: background 0.15s, color 0.15s; }
.tab-btn.active { background: rgba(255,255,255,0.06); color: var(--text-primary); }
.pane { display: none; }
.pane.active { display: block; }

.log-list { display: flex; flex-direction: column; gap: 8px; }
.log-item {
  display: flex; align-items: center; gap: 12px; padding: 11px 14px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px;
}
.log-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.log-sub { flex: 1; font-size: 13.5px; color: var(--text-primary); font-weight: 600; }
.log-ts { font-size: 11px; color: var(--text-tertiary); }
.log-dur { font-family: var(--font-mono); font-size: 11px; color: var(--accent); }
.empty-msg { text-align: center; padding: 32px; font-size: 13px; color: var(--text-tertiary); font-style: italic; }

.chart-label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 14px; }
.bar-rows { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-name { font-size: 12px; color: var(--text-secondary); width: 90px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width 0.4s cubic-bezier(0.22,1,0.36,1); }
.bar-hrs { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 36px; text-align: right; }

.modal-bg { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.65); backdrop-filter: blur(12px); }
.modal-bg.open { display: flex; }
.modal { width: 100%; max-width: 360px; background: linear-gradient(165deg, rgba(30,44,38,0.92), rgba(10,16,14,0.96)); border: 1px solid rgba(255,255,255,0.12); border-top-color: rgba(255,255,255,0.26); backdrop-filter: blur(28px); border-radius: 20px; padding: 24px; box-shadow: 0 24px 70px rgba(0,0,0,0.6); }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-title { font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--text-primary); }
.modal-close { border: 0; background: transparent; color: var(--text-tertiary); font-size: 26px; line-height: 1; cursor: pointer; padding: 0 4px; }
.modal-close:hover { color: var(--text-primary); }
.fi-row { display: flex; gap: 8px; }
.fi { flex: 1; padding: 11px 13px; border: 1px solid rgba(255,255,255,0.08); border-radius: 11px; background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s; }
.fi:focus { border-color: rgba(107,227,164,0.45); }
.fi-add { border: 0; border-radius: 11px; padding: 0 16px; background: var(--accent); color: #04140d; font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer; }
.sub-items { display: flex; flex-direction: column; gap: 7px; margin-top: 12px; max-height: 200px; overflow-y: auto; }
.sub-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; }
.sub-item span { flex: 1; font-size: 13.5px; color: var(--text-primary); }
.sub-del { border: 0; background: transparent; color: var(--text-tertiary); font-size: 16px; cursor: pointer; padding: 0; opacity: 0.5; transition: opacity 0.15s, color 0.15s; }
.sub-del:hover { opacity: 1; color: #FF6B6B; }
</style>
</head>
<body>
<div class="page">
  <div class="page-head">
    <a class="back-btn" href="index.html">←</a>
    <h1 class="page-title">Pomodoro</h1>
  </div>

  <div class="glass">
    <div class="modes" id="modeRow">
      <button class="mode-btn active" data-dur="25" data-label="Focus">Focus · 25m</button>
      <button class="mode-btn" data-dur="5" data-label="Short Break">Short · 5m</button>
      <button class="mode-btn" data-dur="15" data-label="Long Break">Long · 15m</button>
    </div>

    <div class="subject-row">
      <select class="subject-sel" id="subjectSel"></select>
      <button class="icon-btn" id="openSubjects" title="Manage subjects">&#43;</button>
    </div>

    <div class="timer-wrap">
      <div class="timer-ring">
        <svg width="220" height="220" viewBox="0 0 220 220">
          <circle class="t-track" cx="110" cy="110" r="96" stroke-width="8"/>
          <circle class="t-prog" id="tProg" cx="110" cy="110" r="96" stroke-width="8"
            stroke-dasharray="603.19" stroke-dashoffset="0" transform="rotate(-90 110 110)"/>
        </svg>
        <div class="timer-inner">
          <div class="t-time" id="tTime">25:00</div>
          <div class="t-label" id="tLabel">Focus</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="resetBtn">Reset</button>
      <button class="btn primary" id="startBtn">Start</button>
    </div>

    <div class="streak-row">
      <div class="streak-days" id="streakDays"></div>
      <div class="streak-txt" id="streakTxt"></div>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-pane="log">Session Log</button>
    <button class="tab-btn" data-pane="week">This Week</button>
  </div>

  <div id="pane-log" class="pane active">
    <div class="log-list" id="logList"></div>
  </div>
  <div id="pane-week" class="pane">
    <div class="glass">
      <div class="chart-label">Hours per subject this week</div>
      <div class="bar-rows" id="chartBars"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="subModal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Subjects</span>
      <button class="modal-close" id="closeSubjects">&times;</button>
    </div>
    <div class="fi-row">
      <input class="fi" id="newSub" placeholder="Add subject..." autocomplete="off">
      <button class="fi-add" id="addSubBtn">Add</button>
    </div>
    <div class="sub-items" id="subItems"></div>
  </div>
</div>

<script>
(function () {
  'use strict';
  const LS = 'pomodoro_v1';
  const CIRC = 2 * Math.PI * 96;
  const DAY_ABBR = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  function load() {
    try { return JSON.parse(localStorage.getItem(LS)) || { subjects: ['Wiskunde', 'Frans', 'Engels'], sessions: [] }; }
    catch (e) { return { subjects: ['Wiskunde', 'Frans', 'Engels'], sessions: [] }; }
  }
  function persist() { localStorage.setItem(LS, JSON.stringify(data)); }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  let data = load();
  let totalSecs = 25 * 60;
  let remaining = totalSecs;
  let modeLabel = 'Focus';
  let running = false;
  let ticker = null;

  // subject select
  function buildSel() {
    const sel = document.getElementById('subjectSel');
    const prev = sel.value;
    sel.innerHTML = data.subjects.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
    if (prev && data.subjects.includes(prev)) sel.value = prev;
  }

  // timer display
  function draw() {
    const m = String(Math.floor(remaining / 60)).padStart(2,'0');
    const s = String(remaining % 60).padStart(2,'0');
    document.getElementById('tTime').textContent = m + ':' + s;
    document.getElementById('tLabel').textContent = modeLabel;
    document.getElementById('tProg').style.strokeDashoffset = CIRC * (1 - remaining / totalSecs);
    document.title = m + ':' + s + ' · ' + modeLabel;
  }

  function setMode(dur, label) {
    clearInterval(ticker); running = false;
    totalSecs = dur * 60; remaining = totalSecs; modeLabel = label;
    document.getElementById('startBtn').textContent = 'Start';
    draw();
  }

  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 220, 440].forEach(delay => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 880;
        const t = ctx.currentTime + delay / 1000;
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        o.start(t); o.stop(t + 0.35);
      });
    } catch (e) {}
  }

  function tick() {
    if (remaining <= 0) {
      clearInterval(ticker); running = false;
      document.getElementById('startBtn').textContent = 'Start';
      beep();
      if (modeLabel === 'Focus') {
        const sub = document.getElementById('subjectSel').value;
        if (sub) {
          data.sessions.unshift({ id: Date.now().toString(36), subject: sub, duration: Math.round(totalSecs / 60), ts: new Date().toISOString() });
          persist(); renderLog(); renderStreak();
        }
      }
      return;
    }
    remaining--;
    draw();
  }

  document.getElementById('startBtn').addEventListener('click', () => {
    if (running) {
      clearInterval(ticker); running = false;
      document.getElementById('startBtn').textContent = 'Continue';
    } else {
      if (remaining <= 0) remaining = totalSecs;
      running = true; ticker = setInterval(tick, 1000);
      document.getElementById('startBtn').textContent = 'Pause';
    }
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    clearInterval(ticker); running = false; remaining = totalSecs;
    document.getElementById('startBtn').textContent = 'Start';
    draw();
  });
  document.getElementById('modeRow').addEventListener('click', e => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setMode(Number(btn.dataset.dur), btn.dataset.label);
  });

  // log
  function fmtTs(iso) {
    try { return new Date(iso).toLocaleString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
    catch (e) { return ''; }
  }
  function renderLog() {
    const el = document.getElementById('logList');
    if (!data.sessions.length) { el.innerHTML = '<div class="empty-msg">No sessions yet. Finish a focus block to log it.</div>'; return; }
    el.innerHTML = data.sessions.slice(0, 60).map(s =>
      `<div class="log-item"><div class="log-dot"></div><div class="log-sub">${esc(s.subject)}</div><div class="log-ts">${fmtTs(s.ts)}</div><div class="log-dur">${s.duration}m</div></div>`
    ).join('');
  }

  // streak
  function weekStart() { const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() - d.getDay()); return d; }
  function renderStreak() {
    const ws = weekStart();
    const today = new Date(); today.setHours(0,0,0,0);
    const doneDays = new Set(data.sessions.map(s => { const d = new Date(s.ts); d.setHours(0,0,0,0); return d.getTime(); }));
    let count = 0;
    const html = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(ws); d.setDate(ws.getDate() + i);
      const done = doneDays.has(d.getTime());
      if (done) count++;
      const isToday = d.getTime() === today.getTime();
      html.push(`<div class="s-day${done?' done':''}${isToday?' today':''}">${DAY_ABBR[i]}</div>`);
    }
    document.getElementById('streakDays').innerHTML = html.join('');
    document.getElementById('streakTxt').textContent = count + ' / 7 days';
  }

  // chart
  function renderChart() {
    const ws = weekStart().getTime(), we = ws + 7 * 86400000;
    const bySubject = {};
    data.sessions.filter(s => { const t = new Date(s.ts).getTime(); return t >= ws && t < we; })
      .forEach(s => { bySubject[s.subject] = (bySubject[s.subject] || 0) + s.duration; });
    const entries = Object.entries(bySubject).sort((a,b) => b[1]-a[1]);
    const el = document.getElementById('chartBars');
    if (!entries.length) { el.innerHTML = '<div class="empty-msg">No sessions this week yet.</div>'; return; }
    const max = Math.max(...entries.map(e=>e[1]));
    el.innerHTML = entries.map(([sub, mins]) =>
      `<div class="bar-row">
        <div class="bar-name">${esc(sub)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(mins/max*100)}%"></div></div>
        <div class="bar-hrs">${(mins/60).toFixed(1)}h</div>
      </div>`
    ).join('');
  }

  // tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('pane-'+btn.dataset.pane).classList.add('active');
      if (btn.dataset.pane === 'week') renderChart();
    });
  });

  // subjects modal
  const subModal = document.getElementById('subModal');
  document.getElementById('openSubjects').addEventListener('click', () => { renderSubItems(); subModal.classList.add('open'); });
  document.getElementById('closeSubjects').addEventListener('click', () => subModal.classList.remove('open'));
  subModal.addEventListener('click', e => { if (e.target === subModal) subModal.classList.remove('open'); });

  function renderSubItems() {
    const el = document.getElementById('subItems');
    if (!data.subjects.length) { el.innerHTML = '<div style="font-size:13px;color:var(--text-tertiary);padding:8px 0">No subjects.</div>'; return; }
    el.innerHTML = data.subjects.map((s,i) =>
      `<div class="sub-item"><span>${esc(s)}</span><button class="sub-del" data-idx="${i}">&times;</button></div>`
    ).join('');
    el.querySelectorAll('.sub-del').forEach(btn => {
      btn.addEventListener('click', () => {
        data.subjects.splice(Number(btn.dataset.idx), 1);
        persist(); buildSel(); renderSubItems();
      });
    });
  }
  document.getElementById('addSubBtn').addEventListener('click', () => {
    const v = document.getElementById('newSub').value.trim();
    if (!v || data.subjects.includes(v)) return;
    data.subjects.push(v); persist(); buildSel(); renderSubItems();
    document.getElementById('newSub').value = '';
  });
  document.getElementById('newSub').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('addSubBtn').click(); });

  buildSel(); renderLog(); renderStreak(); draw();
})();
</script>
</body>
</html>
